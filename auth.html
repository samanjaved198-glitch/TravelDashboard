<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In or Sign Up — Wanderly</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div id="page-loader"><div class="loader-plane"></div></div>

<header class="navbar">
  <div class="container">
    <a href="index.html" class="logo">Wanderly<span class="dot">.</span></a>
    <div class="nav-actions">
      <button class="icon-btn dm-toggle" id="dark-toggle" aria-label="Toggle dark mode"></button>
      <a href="index.html" class="btn btn-ghost btn-sm">← Back home</a>
    </div>
  </div>
</header>

<section class="section" style="padding-top:64px;">
  <div class="container" style="max-width:440px;">
    <div class="panel" style="padding:40px 34px;">

      <div class="section-head" style="margin-bottom:24px;">
        <span class="eyebrow">Welcome to Wanderly</span>
        <h2 style="font-size:1.5rem; margin-top:8px;">Access your account</h2>
      </div>

      <div class="auth-tabs">
        <button type="button" class="auth-tab" data-tab="signin">Sign In</button>
        <button type="button" class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <!-- ===================== SIGN IN ===================== -->
      <form id="signin-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="si-email">Email</label>
          <input type="email" id="si-email" placeholder="you@example.com">
          <div class="error-msg">Please enter a valid email.</div>
        </div>
        <div class="form-group">
          <label for="si-password">Password</label>
          <input type="password" id="si-password" placeholder="••••••••">
          <div class="error-msg">Password is required.</div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        <p style="text-align:center; font-size:0.85rem; color:var(--text-muted); margin-top:18px;">
          Don't have an account? <a href="#" data-switch-to="signup" style="color:var(--primary); font-weight:600;">Sign Up</a>
        </p>
      </form>

      <!-- ===================== SIGN UP ===================== -->
      <form id="signup-form" class="auth-form hidden" novalidate>
        <div class="form-group">
          <label for="su-name">Full Name</label>
          <input type="text" id="su-name" placeholder="e.g. Rana Ahmed">
          <div class="error-msg">Please enter your name.</div>
        </div>
        <div class="form-group">
          <label for="su-email">Email</label>
          <input type="email" id="su-email" placeholder="you@example.com">
          <div class="error-msg">Please enter a valid email.</div>
        </div>
        <div class="form-group">
          <label for="su-password">Password</label>
          <input type="password" id="su-password" placeholder="At least 6 characters">
          <div class="error-msg">Password must be at least 6 characters.</div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        <p style="text-align:center; font-size:0.85rem; color:var(--text-muted); margin-top:18px;">
          Already have an account? <a href="#" data-switch-to="signin" style="color:var(--primary); font-weight:600;">Sign In</a>
        </p>
      </form>

    </div>
  </div>
</section>

<div id="toast-stack"></div>

<script src="js/darkmode.js"></script>
<script src="js/validation.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  // Let the "Sign Up" / "Sign In" links inside each form switch tabs too.
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('[data-switch-to]').forEach(function (link) {
      link.addEventListener('click', function (e) {
        e.preventDefault();
        document.querySelector('.auth-tab[data-tab="' + link.dataset.switchTo + '"]').click();
      });
    });
  });
</script>
</body>
</html>
